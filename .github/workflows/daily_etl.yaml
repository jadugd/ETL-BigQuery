name: Daily BigQuery Load

on:
  schedule:
    # Berjalan setiap hari jam 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch: # Memungkinkan Anda menjalankan manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run BigQuery Script
      env:
        # Mengambil JSON dari Secret GitHub dan menyimpannya sebagai file sementara
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        # Membuat file json dari secret agar bisa dibaca script
        echo "$GCP_SA_KEY" > service-account.json
        
        # Menentukan path kredensial agar dibaca oleh google-cloud-bigquery
        export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
        
        python scripts/etl.py